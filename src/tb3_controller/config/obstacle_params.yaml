obstacle_avoidance_node:
  ros__parameters:
    # Distance (m) below which forward motion is blocked
    obstacle_threshold_m: 0.35
    # Angular half-width of the "front" arc checked (degrees)
    front_arc_deg: 30.0
    # Cmd-vel input topic (from teleop, remapped away from /cmd_vel)
    cmd_vel_raw_topic: /cmd_vel_raw
    # Cmd-vel output topic (to robot / gz bridge)
    cmd_vel_topic: /cmd_vel
