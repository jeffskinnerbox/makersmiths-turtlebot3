# slam_params.yaml — slam_toolbox online_async tuned for TB3 Burger in Gazebo Harmonic
#
# Differences from upstream mapper_params_online_async.yaml defaults:
#   - minimum_travel_distance/heading reduced (0.5 → 0.2) for faster map updates while driving
#   - map_update_interval reduced (5.0 → 3.0) for more frequent /map publishes
#   - transform_timeout increased (0.2 → 0.5) to tolerate sim-time jitter
#   - enable_interactive_mode disabled (no RViz interactive plugin in headless/test mode)

slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frame / topic wiring (TB3 Burger)
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping

    # Timing
    map_update_interval: 3.0        # seconds between /map publishes (default 5.0)
    minimum_time_interval: 0.5
    transform_timeout: 0.5          # generous for sim-time jitter (default 0.2)
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02

    # Travel thresholds before accepting a new scan
    minimum_travel_distance: 0.2    # metres (default 0.5; lower = more scans captured)
    minimum_travel_heading: 0.2     # radians (default 0.5)

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    throttle_scans: 1
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    max_laser_range: 12.0           # TB3 LiDAR max ~12 m

    # Map resolution
    resolution: 0.05

    # Loop closure
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    loop_search_maximum_distance: 3.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # Correlation search
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan matcher penalties
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1

    # Misc
    stack_size_to_use: 40000000
    use_map_saver: true
    enable_interactive_mode: false  # no RViz interactive plugin needed
    debug_logging: false
