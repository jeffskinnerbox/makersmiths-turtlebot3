# gazebo_params.yaml — shared simulation parameters
#
# Pass to any node that needs use_sim_time during simulation:
#   parameters=[gazebo_params_file]
#
# All nodes launched by sim_bringup.launch.py must set use_sim_time: true
# so they subscribe to /clock instead of wall time.

/**:
  ros__parameters:
    use_sim_time: true
