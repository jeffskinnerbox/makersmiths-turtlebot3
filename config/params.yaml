# TurtleBot3 node parameters
# Load via: ros2 run <pkg> <node> --ros-args --params-file /path/to/params.yaml

turtlebot3:
  model: burger
  ros_domain_id: 0
  rmw_implementation: rmw_cyclonedds_cpp

/turtlebot3_node:
  ros__parameters:
    opencr:
      id: 200
      baud_rate: 1000000
      protocol_version: 2.0
    sensor:
      imu_frequency: 200
      range_threshold: 0.01
